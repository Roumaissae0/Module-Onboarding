<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>My form exercise</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header>
      <h1>T-SHIRTS SL </h1><!--Changed the name-->
    </header>
    <main>
      <form>
       <fieldset>
         <legend>Personal Information</legend>

           <label for="name">Name:</label>
           <input type="text" id="name" name="name" required minlength="2" /><!--The name it has to be Lara-->
       
           <label for="email">Email:</label>
           <input type="email" id="email" name="email" required /><!--The email it has to be lara@gmail.com-->

      </fieldset>
        <fieldset>
         <legend> Color options </legend>

           <label for="color">Color:</label>
           <select id="color" name="color" required>

            <option value="">Select color</option>
            <option value="RED">Red</option>
            <option value="BLUE">Blue</option>
            <option value="GREEN">Green</option>

           </select>
          
        </fieldset>
        <fieldset>
         <legend> Sizs options </legend><!--Its more pretty with the legend element -->

          <label for="size">Size:</label>
          <select id="size" name="size" required>
            <option value="">Select size</option>
            <option value="XS">Extra Small</option>
            <option value="S">Small</option>
            <option value="M">Medium</option>
            <option value="L">Large</option>
            <option value="XL">Extra Large</option>
            <option value="XXL">Double Extra Large</option>

          </select>
        </fieldset>
        <button type="submit" >Submit</button>
        <button type="reset">Reset</button>
      </form>
      
    </main>
    <footer>
      
      <h2>By Roumaissae Bakkali Benali</h2><!-- Name changed-->
    </footer>
  </body>
</html>
